<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ramo de Tulipanes Amarillos</title>
    <style>
        *,
        *::after,
        *::before {
          padding: 0;
          margin: 0;
          box-sizing: border-box;
        }

        :root {
          --dark-color: #000;
          --fl-speed: 0.8s;
          --speed-leaf: 2s;
        }

        body {
          display: flex;
          align-items: flex-end;
          justify-content: center;
          min-height: 100vh;
          background-color: var(--dark-color);
          overflow: hidden;
          perspective: 1000px;
        }

        .night {
          position: fixed;
          left: 50%;
          top: 0;
          transform: translateX(-50%);
          width: 100%;
          height: 100%;
          filter: blur(0.1vmin);
          background-image: radial-gradient(
              ellipse at top,
              transparent 0%,
              var(--dark-color)
            ),
            radial-gradient(
              ellipse at bottom,
              var(--dark-color),
              rgba(145, 233, 255, 0.2)
            ),
            repeating-linear-gradient(
              220deg,
              rgb(0, 0, 0) 0px,
              rgb(0, 0, 0) 19px,
              transparent 19px,
              transparent 22px
            ),
            repeating-linear-gradient(
              189deg,
              rgb(0, 0, 0) 0px,
              rgb(0, 0, 0) 19px,
              transparent 19px,
              transparent 22px
            ),
            repeating-linear-gradient(
              148deg,
              rgb(0, 0, 0) 0px,
              rgb(0, 0, 0) 19px,
              transparent 19px,
              transparent 22px
            ),
            linear-gradient(90deg, rgb(0, 255, 250), rgb(240, 240, 240));
        }

        .shooting-stars {
          position: fixed;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
          z-index: 1;
        }

        .shooting-star {
          position: absolute;
          width: 4px;
          height: 4px;
          background: #fff;
          border-radius: 50%;
          box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.8);
          opacity: 0;
          animation: shootingStar 3s linear infinite;
        }

        .shooting-star::before {
          content: '';
          position: absolute;
          top: 50%;
          right: 0;
          transform: translateY(-50%);
          width: 0;
          height: 2px;
          background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 1) 100%);
          animation: shootingStarTail 3s linear infinite;
        }

        .shooting-star:nth-child(1) {
          top: 5%;
          left: -10%;
          animation-delay: 0s;
          animation-duration: 2.5s;
        }

        .shooting-star:nth-child(2) {
          top: 15%;
          left: -10%;
          animation-delay: 2s;
          animation-duration: 3s;
        }

        .shooting-star:nth-child(3) {
          top: 25%;
          left: -10%;
          animation-delay: 4s;
          animation-duration: 2.8s;
        }

        .shooting-star:nth-child(4) {
          top: 0%;
          left: -10%;
          animation-delay: 6s;
          animation-duration: 3.2s;
        }

        .shooting-star:nth-child(5) {
          top: 35%;
          left: -10%;
          animation-delay: 8s;
          animation-duration: 2.7s;
        }

        .shooting-star:nth-child(6) {
          top: 8%;
          left: -10%;
          animation-delay: 10s;
          animation-duration: 3.1s;
        }

        .shooting-star:nth-child(7) {
          top: 45%;
          left: -10%;
          animation-delay: 12s;
          animation-duration: 2.9s;
        }

        .shooting-star:nth-child(8) {
          top: 3%;
          left: -10%;
          animation-delay: 14s;
          animation-duration: 3.3s;
        }

        @keyframes shootingStar {
          0% {
            opacity: 0;
            transform: translateX(0) translateY(0) rotate(45deg);
          }
          10% {
            opacity: 1;
          }
          90% {
            opacity: 1;
          }
          100% {
            opacity: 0;
            transform: translateX(120vw) translateY(50vh) rotate(10deg);
          }
        }

        @keyframes shootingStarTail {
          0% {
            width: 0;
          }
          30% {
            width: 100px;
          }
          100% {
            width: 0;
          }
        }

        .flowers {
          position: relative;
          transform: scale(0.7);
          z-index: 2;
        }

        .flower {
          position: absolute;
          bottom: 15vmin;
          transform-origin: bottom center;
          z-index: 50;
        }

        .flower--1 {
          animation: moving-flower-1 4s linear infinite;
        }

        .flower--1 .flower__line {
          height: 70vmin;
          animation-delay: 0.3s;
        }

        .flower--1 .flower__line__leaf--1 {
          animation: blooming-leaf-right var(--fl-speed) 1.6s backwards;
        }

        .flower--1 .flower__line__leaf--2 {
          animation: blooming-leaf-right var(--fl-speed) 1.4s backwards;
        }

        .flower--1 .flower__line__leaf--3 {
          animation: blooming-leaf-left var(--fl-speed) 1.2s backwards;
        }

        .flower--1 .flower__line__leaf--4 {
          animation: blooming-leaf-left var(--fl-speed) 1s backwards;
        }

        .flower--2 {
          left: 50%;
          transform: rotate(20deg);
          animation: moving-flower-2 4s linear infinite;
        }

        .flower--2 .flower__line {
          height: 60vmin;
          animation-delay: 0.6s;
        }

        .flower--2 .flower__line__leaf--1 {
          animation: blooming-leaf-right var(--fl-speed) 1.9s backwards;
        }

        .flower--2 .flower__line__leaf--2 {
          animation: blooming-leaf-right var(--fl-speed) 1.7s backwards;
        }

        .flower--2 .flower__line__leaf--3 {
          animation: blooming-leaf-left var(--fl-speed) 1.5s backwards;
        }

        .flower--2 .flower__line__leaf--4 {
          animation: blooming-leaf-left var(--fl-speed) 1.3s backwards;
        }

        .flower--3 {
          left: 50%;
          transform: rotate(-15deg);
          animation: moving-flower-3 4s linear infinite;
        }

        .flower--3 .flower__line {
          animation-delay: 0.9s;
        }

        .flower--3 .flower__line__leaf--1 {
          animation: blooming-leaf-right var(--fl-speed) 2.5s backwards;
        }

        .flower--3 .flower__line__leaf--2 {
          animation: blooming-leaf-right var(--fl-speed) 2.3s backwards;
        }

        .flower--3 .flower__line__leaf--3 {
          animation: blooming-leaf-left var(--fl-speed) 2.1s backwards;
        }

        .flower--3 .flower__line__leaf--4 {
          animation: blooming-leaf-left var(--fl-speed) 1.9s backwards;
        }

        .flower--4 {
          left: -25%;
          z-index: -6;
          transform: rotate(10deg);
          animation: moving-flower-4 3.5s linear infinite;
        }

        .flower--4 .flower__line {
          height: 90vmin;
          animation-delay: 1.2s;
        }

        .flower--4 .flower__line__leaf--1 {
          animation: blooming-leaf-right var(--fl-speed) 2.8s backwards;
        }

        .flower--4 .flower__line__leaf--2 {
          animation: blooming-leaf-right var(--fl-speed) 2.6s backwards;
        }

        .flower--4 .flower__line__leaf--3 {
          animation: blooming-leaf-left var(--fl-speed) 2.4s backwards;
        }

        .flower--4 .flower__line__leaf--4 {
          animation: blooming-leaf-left var(--fl-speed) 2.2s backwards;
        }

        .flower--5 {
          left: 75%;
          z-index: -7;
          transform: rotate(-25deg);
          animation: moving-flower-5 4.5s linear infinite;
        }

        .flower--5 .flower__line {
          height: 85vmin;
          animation-delay: 1.9s;
        }

        .flower--5 .flower__line__leaf--1 {
          animation: blooming-leaf-right var(--fl-speed) 2.7s backwards;
        }

        .flower--5 .flower__line__leaf--2 {
          animation: blooming-leaf-right var(--fl-speed) 2.5s backwards;
        }

        .flower--5 .flower__line__leaf--3 {
          animation: blooming-leaf-left var(--fl-speed) 2.3s backwards;
        }

        .flower--5 .flower__line__leaf--4 {
          animation: blooming-leaf-left var(--fl-speed) 2.1s backwards;
        }

        .flower__leafs {
          position: relative;
          animation: blooming-flower 2s backwards;
        }

        .flower__leafs--1 {
          animation-delay: 1.1s;
        }

        .flower__leafs--2 {
          animation-delay: 1.4s;
        }

        .flower__leafs--3 {
          animation-delay: 1.7s;
        }

        .flower__leafs--4 {
          animation-delay: 2.0s;
        }

        .flower__leafs--5 {
          animation-delay: 2.0s;
        }

        .flower__leafs::after {
          content: "";
          position: absolute;
          left: 0;
          top: 0;
          transform: translate(-50%, -100%);
          width: 8vmin;
          height: 8vmin;
          /* luz ambiental rojiza en lugar de amarilla */
          background-color: rgba(255, 80, 80, 0.9);
          filter: blur(8vmin);
          mix-blend-mode: screen;
        }

        /* --- PÉTALOS DE TULIPÁN (MEJORADOS, ROJOS) --- */
        .flower__leaf {
          position: absolute;
          bottom: 0;
          left: 50%;
          width: 9vmin;
          height: 15vmin;
          /* capas para volumen: brillo, cuerpo rojo y sombras */
          background:
            radial-gradient(circle at 30% 25%, rgba(255,230,230,1) 0%, rgba(255,140,140,0.9) 10%, rgba(255,140,140,0) 30%),
            radial-gradient(circle at 70% 75%, rgba(255,255,255,0.18) 0%, rgba(255,255,255,0) 35%),
            linear-gradient(180deg, #ff4d4d 0%, #c30f0f 65%, #7a0404 100%);
          border-radius: 50% 50% 40% 40% / 60% 60% 40% 40%;
          transform-origin: bottom center;
          opacity: 0.98;
          z-index: 2;
          border: 1.2px solid rgba(195,15,15,0.9);
          box-shadow:
            0 0 0.6vmin rgba(255,80,80,0.18),
            0 0 0.35vmin rgba(255,60,60,0.08),
            inset 0 -0.9vmin 1.2vmin rgba(0,0,0,0.25);
          /* ligera textura de venas */
          background-blend-mode: normal, screen, multiply;
          filter: drop-shadow(0 0 0.2vmin rgba(200,20,20,0.15));
        }

        /* Pétalos externos */
        .flower__leaf--1 { transform: translate(-50%, -5%) rotate(-22deg); z-index: 1; }
        .flower__leaf--2 { transform: translate(-50%, -5%) rotate(22deg);  z-index: 1; }
        .flower__leaf--3 { transform: translate(-50%, -10%) rotate(0deg);  z-index: 2; }

        /* Pétalos internos (más pequeños, para dar volumen) */
        .flower__leaf--4,
        .flower__leaf--5,
        .flower__leaf--6 {
          width: 7vmin;
          height: 12vmin;
          background:
            radial-gradient(circle at 30% 20%, rgba(255,210,210,1) 0%, rgba(255,110,110,0.95) 20%, rgba(255,110,110,0) 45%),
            linear-gradient(180deg, #ff6b6b 0%, #b30b0b 70%);
          opacity: 0.96;
          border: 1px solid rgba(220,80,80,0.9);
          border-radius: 50% 50% 45% 45% / 65% 65% 35% 35%;
          box-shadow:
            0 0 0.6vmin rgba(255,140,140,0.16),
            inset 0 -0.6vmin 0.9vmin rgba(0,0,0,0.2);
          z-index: 3;
          filter: drop-shadow(0 0 0.12vmin rgba(150,20,20,0.12));
        }

        .flower__leaf--4 { transform: translate(-50%, -8%) rotate(-10deg); }
        .flower__leaf--5 { transform: translate(-50%, -8%) rotate(10deg); }
        .flower__leaf--6 { transform: translate(-50%, -12%) rotate(0deg); }

        /* Centro del tulipán más profundo y natural */
        .flower__center {
          position: absolute;
          left: -2vmin;
          top: -2vmin;
          width: 4vmin;
          height: 4vmin;
          border-radius: 50%;
          background:
            radial-gradient(circle at 30% 30%, #ffd79a 0%, #ff9a4a 30%, #7a2000 65%, #330800 100%);
          border: 1.5px solid rgba(255,160,90,0.9);
          box-shadow: inset 0 -0.4vmin 0.6vmin rgba(0,0,0,0.35), 0 0 0.6vmin rgba(255,120,60,0.12);
          z-index: 4;
        }

        /* Tallo: corregido y con más definición */
        .flower__line {
          height: 55vmin;
          width: 2vmin;
          background-image: linear-gradient(to top, transparent 10%, #2d5016 40%, #4a7c23 70%, #6b8e23 100%);
          box-shadow: inset 0 0 2px rgba(0, 0, 0, 0.5), 0 0 0.6vmin rgba(0,0,0,0.08);
          animation: grow-flower-tree 4s backwards;
        }

        .flower__line__leaf {
          --w: 8vmin;
          --h: calc(var(--w) + 3vmin);
          position: absolute;
          top: 20%;
          left: 90%;
          width: var(--w);
          height: var(--h);
          border-top-right-radius: var(--h);
          border-bottom-left-radius: var(--h);
          background-image: linear-gradient(
            to top,
            rgba(45, 80, 22, 0.6),
            #4a7c23,
            #6b8e23
          );
          box-shadow: inset 0 0 1vmin rgba(0, 0, 0, 0.3);
        }

        .flower__line__leaf--1 {
          transform: rotate(70deg) rotateY(30deg);
        }

        .flower__line__leaf--2 {
          top: 45%;
          transform: rotate(70deg) rotateY(30deg);
        }

        .flower__line__leaf--3,
        .flower__line__leaf--4{
          border-top-right-radius: 0;
          border-bottom-left-radius: 0;
          border-top-left-radius: var(--h);
          border-bottom-right-radius: var(--h);
          left: -460%;
          top: 12%;
          transform: rotate(-70deg) rotateY(30deg);
        }

        .flower__line__leaf--4 {
          top: 40%;
        }

        .flower__light {
          position: absolute;
          bottom: 0vmin;
          width: 0.8vmin;
          height: 0.8vmin;
          background-color: #ffdd00;
          border-radius: 50%;
          filter: blur(0.1vmin);
          animation: tulip-light 6s linear infinite backwards;
          box-shadow: 0 0 1vmin rgba(255, 221, 0, 0.8);
        }

        .flower__light:nth-child(odd) {
          background-color: #ffaa00;
        }

        .flower__light--1 { left: -2vmin; animation-delay: 1s; }
        .flower__light--2 { left: 3vmin; animation-delay: 0.5s; }
        .flower__light--3 { left: -6vmin; animation-delay: 0.3s; }
        .flower__light--4 { left: 6vmin; animation-delay: 0.9s; }
        .flower__light--5 { left: -1vmin; animation-delay: 1.5s; }
        .flower__light--6 { left: -4vmin; animation-delay: 3s; }
        .flower__light--7 { left: 3vmin; animation-delay: 2s; }
        .flower__light--8 { left: -6vmin; animation-delay: 3.5s; }

        .flower__grass {
          --c: #4a7c23;
          --line-w: 2vmin;
          position: absolute;
          bottom: 12vmin;
          left: -7vmin;
          display: flex;
          flex-direction: column;
          align-items: flex-end;
          z-index: 20;
          transform-origin: bottom center;
          transform: rotate(-48deg) rotateY(40deg);
        }

        .flower__grass--1 {
          animation: moving-grass 2s linear infinite;
        }

        .flower__grass--2 {
          left: 2vmin;
          bottom: 10vmin;
          transform: scale(0.5) rotate(75deg) rotateX(10deg) rotateY(-200deg);
          opacity: 0.8;
          z-index: 0;
          animation: moving-grass--2 1.5s linear infinite;
        }

        .flower__grass--3 {
          left: -25vmin;
          bottom: 8vmin;
          transform: scale(0.7) rotate(-30deg) rotateY(45deg);
          opacity: 0.9;
          z-index: 15;
          animation: moving-grass--3 2.2s linear infinite;
        }

        .flower__grass--4 {
          left: -35vmin;
          bottom: 15vmin;
          transform: scale(0.4) rotate(60deg) rotateX(15deg) rotateY(-180deg);
          opacity: 0.7;
          z-index: 5;
          animation: moving-grass--4 1.8s linear infinite;
        }

        .flower__grass--5 {
          left: -18vmin;
          bottom: 6vmin;
          transform: scale(0.6) rotate(-60deg) rotateY(60deg);
          opacity: 0.85;
          z-index: 12;
          animation: moving-grass--5 2.5s linear infinite;
        }

        .flower__grass--6 {
          left: 25vmin;
          bottom: 9vmin;
          transform: scale(0.65) rotate(35deg) rotateY(-45deg);
          opacity: 0.9;
          z-index: 15;
          animation: moving-grass--6 2.3s linear infinite;
        }

        .flower__grass--7 {
          left: 35vmin;
          bottom: 14vmin;
          transform: scale(0.45) rotate(-70deg) rotateX(20deg) rotateY(170deg);
          opacity: 0.75;
          z-index: 8;
          animation: moving-grass--7 1.9s linear infinite;
        }

        .flower__grass--8 {
          left: 18vmin;
          bottom: 5vmin;
          transform: scale(0.55) rotate(50deg) rotateY(-70deg);
          opacity: 0.8;
          z-index: 10;
          animation: moving-grass--8 2.1s linear infinite;
        }

        .flower__grass--9 {
          left: -45vmin;
          bottom: 20vmin;
          transform: scale(0.3) rotate(20deg) rotateY(90deg);
          opacity: 0.6;
          z-index: 2;
          animation: moving-grass--9 1.6s linear infinite;
        }

        .flower__grass--10 {
          left: 42vmin;
          bottom: 18vmin;
          transform: scale(0.35) rotate(-45deg) rotateY(-120deg);
          opacity: 0.65;
          z-index: 3;
          animation: moving-grass--10 2.0s linear infinite;
        }

        .flower__grass--top {
          width: 7vmin;
          height: 10vmin;
          border-top-right-radius: 100%;
          border-right: var(--line-w) solid var(--c);
          transform-origin: bottom center;
          transform: rotate(-2deg);
        }

        .flower__grass--bottom {
          margin-top: -2px;
          width: var(--line-w);
          height: 25vmin;
          background-image: linear-gradient(to top, transparent, var(--c));
        }

        .flower__grass__leaf {
          --size: 10vmin;
          position: absolute;
          width: calc(var(--size) * 2.1);
          height: var(--size);
          border-top-left-radius: var(--size);
          border-top-right-radius: var(--size);
          background-image: linear-gradient(
            to top,
            transparent,
            transparent 30%,
            var(--c)
          );
          z-index: 100;
        }

        .flower__grass__leaf--1 {
          top: -6%;
          left: 30%;
          --size: 6vmin;
          transform: rotate(-20deg);
          animation: growing-grass-ans--1 var(--speed-leaf) 2.6s backwards;
        }

        .flower__grass__leaf--2 {
          top: -5%;
          left: -110%;
          --size: 6vmin;
          transform: rotate(10deg);
          animation: growing-grass-ans--2 var(--speed-leaf) 2.4s linear backwards;
        }

        .flower__grass__leaf--3 {
          top: 5%;
          left: 60%;
          --size: 8vmin;
          transform: rotate(-18deg) rotateX(-20deg);
          animation: growing-grass-ans--3 var(--speed-leaf) 2.2s linear backwards;
        }

        .flower__grass__leaf--4 {
          top: 6%;
          left: -135%;
          --size: 8vmin;
          transform: rotate(2deg);
          animation: growing-grass-ans--4 var(--speed-leaf) 2s linear backwards;
        }

        .flower__grass__leaf--5 {
          top: 20%;
          left: 60%;
          --size: 10vmin;
          transform: rotate(-24deg) rotateX(-20deg);
          animation: growing-grass-ans--5 var(--speed-leaf) 1.8s linear backwards;
        }

        .flower__grass__leaf--6 {
          top: 22%;
          left: -180%;
          --size: 10vmin;
          transform: rotate(10deg);
          animation: growing-grass-ans--6 var(--speed-leaf) 1.6s linear backwards;
        }

        .flower__grass__leaf--7 {
          top: 39%;
          left: 70%;
          --size: 10vmin;
          transform: rotate(-10deg);
          animation: growing-grass-ans--7 var(--speed-leaf) 1.4s linear backwards;
        }

        .flower__grass__leaf--8 {
          top: 40%;
          left: -215%;
          --size: 11vmin;
          transform: rotate(10deg);
          animation: growing-grass-ans--8 var(--speed-leaf) 1.2s linear backwards;
        }

        .flower__grass__overlay {
          position: absolute;
          top: -10%;
          right: 0%;
          width: 100%;
          height: 100%;
          background-color: rgba(0, 0, 0, 0.6);
          filter: blur(1.5vmin);
          z-index: 100;
        }

        .special-text {
            position: fixed;
            top: 5%;
            left: 50%;
            transform: translateX(-50%);
            color: #ffdd00;
            font-family: 'Arial', sans-serif;
            font-size: 4vmin;
            text-shadow: 0 0 1vmin rgba(255, 221, 0, 0.5);
            z-index: 10;
            opacity: 0;
            animation: fadeIn 3s 1s forwards;
            text-align: center;
        }

        /* KEYFRAMES */
        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        @keyframes tulip-light {
          0% {
            opacity: 0;
            transform: translateY(0vmin) rotate(0deg);
          }
          20% {
            opacity: 1;
            transform: translateY(-3vmin) translateX(-1vmin) rotate(45deg);
          }
          40% {
            opacity: 1;
            transform: translateY(-8vmin) translateX(1vmin) rotate(90deg);
          }
          60% {
            transform: translateY(-12vmin) translateX(-1vmin) rotate(135deg);
          }
          80% {
            transform: translateY(-16vmin) translateX(2vmin) rotate(180deg);
            opacity: 0.5;
          }
          100% {
            transform: translateY(-25vmin) rotate(225deg);
            opacity: 0;
          }
        }

        @keyframes moving-flower-1 {
          0%, 100% { transform: rotate(2deg); }
          50% { transform: rotate(-2deg); }
        }

        @keyframes moving-flower-2 {
          0%, 100% { transform: rotate(18deg); }
          50% { transform: rotate(14deg); }
        }

        @keyframes moving-flower-3 {
          0%, 100% { transform: rotate(-18deg); }
          50% { transform: rotate(-20deg) rotateY(-10deg); }
        }

        @keyframes moving-flower-4 {
          0%, 100% { transform: rotate(9deg); }
          50% { transform: rotate(12deg) rotateY(9deg); }
        }

        @keyframes moving-flower-5 {
          0%, 100% { transform: rotate(-5deg); }
          50% { transform: rotate(-11deg) rotateY(5deg); }
        }

        @keyframes blooming-leaf-right {
          0% {
            transform-origin: left;
            transform: rotate(70deg) rotateY(30deg) scale(0);
          }
        }

        @keyframes blooming-leaf-left {
          0% {
            transform-origin: right;
            transform: rotate(-70deg) rotateY(30deg) scale(0);
          }
        }

        @keyframes grow-flower-tree {
          0% {
            height: 0;
            border-radius: 1vmin;
          }
        }

        @keyframes blooming-flower {
          0% {
            transform: scale(0);
          }
        }

        @keyframes moving-grass {
          0%, 100% { transform: rotate(-48deg) rotateY(40deg); }
          50% { transform: rotate(-50deg) rotateY(40deg); }
        }

        @keyframes moving-grass--2 {

  <script>
    (function(){
      // util
      function isMobile() {
        return /Android|iPhone|iPad|iPod|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.matchMedia("(pointer:coarse)").matches;
      }

      // show bouquet + small flourish + confetti
      function showRamoFlourish() {
        const ramo = document.querySelector('.ramo');
        if (ramo) ramo.classList.add('ramo--visible');

        // small bloom on flowers
        const flowers = document.querySelector('.flowers');
        if (flowers) {
          flowers.style.transition = 'transform .6s cubic-bezier(.2,.8,.2,1), filter .6s';
          flowers.style.transform = 'scale(0.78) translateY(-3vmin)';
          setTimeout(()=> flowers.style.transform = '', 800);
        }

        // confetti
        runConfetti(120);
        showToast('Ramo mostrado');
      }

      // confetti (simple canvas particles, short)
      function runConfetti(amount){
        const cvs = document.getElementById('confetti') || (function(){
          const c = document.createElement('canvas'); c.id='confetti'; document.body.appendChild(c);
          c.width = innerWidth; c.height = innerHeight;
          return c;
        })();
        const ctx = cvs.getContext('2d');
        let w = cvs.width = innerWidth, h = cvs.height = innerHeight;
        const colors = ['#ff6b6b','#ffdd57','#ff7a00','#c30f0f','#ff3c3c','#ffd6d6'];
        const parts = [];
        for(let i=0;i<amount;i++){
          parts.push({
            x: w/2 + (Math.random()*220-110),
            y: h*0.4 + (Math.random()*80-40),
            vx: (Math.random()-0.5)*6,
            vy: (Math.random()*6)+2,
            r: Math.random()*6+3,
            c: colors[Math.floor(Math.random()*colors.length)],
            rot: Math.random()*360,
            vr: (Math.random()-0.5)*10
          });
        }
        let t = 0;
        function frame(){
          t++;
          ctx.clearRect(0,0,w,h);
          parts.forEach(p=>{
            p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.rot += p.vr;
            ctx.save();
            ctx.translate(p.x,p.y);
            ctx.rotate(p.rot*Math.PI/180);
            ctx.fillStyle = p.c;
            ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*0.6);
            ctx.restore();
          });
          if(t<100){
            requestAnimationFrame(frame);
          } else {
            ctx.clearRect(0,0,w,h);
            // remove canvas to keep DOM clean
            try{ cvs.remove(); } catch(e){}
          }
        }
        frame();
      }

      // toast helper
      function showToast(msg, ms=1600){
        let t = document.querySelector('.mini-toast');
        if(!t){
          t = document.createElement('div'); t.className='mini-toast'; document.body.appendChild(t);
        }
        t.textContent = msg; t.classList.add('show');
        setTimeout(()=> t.classList.remove('show'), ms);
      }

      // deep link to whatsapp (mobile first), fallback to web
      function openWhatsApp(text){
        const encoded = encodeURIComponent(text || '¡Hola!');
        if(isMobile()){
          // try app protocol first
          const app = 'whatsapp://send?text=' + encoded;
          const web = 'https://wa.me/?text=' + encoded;
          // open app, fallback to web after timeout
          let opened = false;
          const start = Date.now();
          const ifr = document.createElement('iframe'); ifr.style.display='none'; ifr.src = app; document.body.appendChild(ifr);
          setTimeout(()=> {
            document.body.removeChild(ifr);
            // open web if app didn't activate quickly
            if(Date.now() - start < 1500) window.open(web, '_blank', 'noopener');
          }, 900);
        } else {
          // desktop -> WhatsApp Web
          window.open('https://web.whatsapp.com/send?text=' + encoded, '_blank', 'noopener');
        }
      }

      // attach action-sheet (keeps only one visible button in UI)
      function ensureActionSheet(){
        if(document.querySelector('.action-sheet')) return document.querySelector('.action-sheet');
        const sheet = document.createElement('div'); sheet.className='action-sheet';
        sheet.innerHTML = '<div style="padding:0.6vmin 0.6vmin;color:#fff;font-size:1.6vmin;opacity:.95;text-align:center">¿Cómo quieres contactar?</div>' +
          '<div class="action-sheet__row" style="margin-top:0.6vmin">' +
          '<button class="btn-whatsapp">WhatsApp</button>' +
          '<button class="btn-call">Llamar</button>' +
          '</div>' +
          '<div style="text-align:center;margin-top:0.6vmin"><button class="btn-close">Cerrar</button></div>';
        document.body.appendChild(sheet);
        // handlers
        sheet.querySelector('.btn-whatsapp').addEventListener('click', function(){
          showRamoFlourish();
          openWhatsApp('Te mando este ramo ❤️');
          hideActionSheet();
        });
        sheet.querySelector('.btn-call').addEventListener('click', function(){
          hideActionSheet();
          showRamoFlourish();
          setTimeout(()=> {
            const num = prompt('Introduce número para llamar (ej: +34123456789):');
            if(num && /^(\+?\d[\d\s-]{4,})$/.test(num.trim())){
              window.location.href = 'tel:' + num.trim();
            } else {
              showToast('Número inválido',1200);
            }
          }, 360);
        });
        sheet.querySelector('.btn-close').addEventListener('click', hideActionSheet);
        return sheet;
      }
      function showActionSheet(){ const s = ensureActionSheet(); requestAnimationFrame(()=> s.classList.add('visible')); }
      function hideActionSheet(){ const s = document.querySelector('.action-sheet'); if(s) s.classList.remove('visible'); }

      // main button logic
      const btn = document.getElementById('showRamoButton');
      if(btn){
        btn.setAttribute('aria-label','Mostrar ramo y contactar');
        btn.addEventListener('click', function(e){
          e.preventDefault();
          // always show ramo visually
          showRamoFlourish();

          // mobile -> show action sheet so user can choose call / whatsapp
          if(isMobile()){
            showActionSheet();
            // small haptic-like feedback on supported devices
            if(navigator.vibrate) navigator.vibrate(30);
            btn.disabled = true;
            btn.style.opacity = '0.9';
            setTimeout(()=> { btn.disabled = false; btn.style.opacity = ''; }, 1200);
          } else {
            // desktop -> open WhatsApp Web immediately
            openWhatsApp('Te mando este ramo ❤️');
            btn.disabled = true;
            btn.style.opacity = '0.7';
            setTimeout(()=> { btn.disabled = false; btn.style.opacity = ''; }, 1500);
          }
        });
      }

      // auto show ramo after initial animation (keeps previous behavior)
      setTimeout(function(){
        const ramo = document.querySelector('.ramo');
        if(ramo) ramo.classList.add('ramo--visible');
      }, 2500);

      // Cleanup/responsive: remove action-sheet when resizing to large screens
      window.addEventListener('resize', function(){
        if(window.innerWidth > 900){
          const s = document.querySelector('.action-sheet'); if(s) s.classList.remove('visible');
        }
      });
    })();
  </script>
</body>
